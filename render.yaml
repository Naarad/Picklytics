services:
  - type: web
    name: picklytics
    runtime: static
    buildCommand: ""
    staticPublishPath: ./
    headers:
      # Allow camera + serve the model files with the right MIME
      - path: /*
        name: Permissions-Policy
        value: camera=(self), microphone=()
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin
      - path: /*
        name: Cross-Origin-Embedder-Policy
        value: credentialless
